<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PREGÓN 95.7 FM - Experiencia iOS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>

    <!-- Reproductor HLS para transmisión de TV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.8/hls.min.js"></script>
</head>
<body class="bg-black m-0 p-0 text-white overflow-hidden font-sans antialiased selection:bg-red-500/30" style="background-color: #000000; color: #ffffff; margin: 0;">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // ==========================================
        // COMPONENTES DE ÍCONOS (Estilo iOS SF Symbols)
        // ==========================================
        const Icon = ({ children, size = 28, className = "", fill = "none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Play = (props) => <Icon {...props} strokeWidth="0" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></Icon>;
        const Pause = (props) => <Icon {...props} strokeWidth="0" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></Icon>;
        const Volume2 = (props) => <Icon {...props} size={20}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
        const VolumeX = (props) => <Icon {...props} size={20}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></Icon>;
        const Radio = (props) => <Icon {...props}><circle cx="12" cy="12" r="2"/><path d="M4.9 19.1a10 10 0 0 1 0-14.2"/><path d="M19.1 4.9a10 10 0 0 1 0 14.2"/><path d="M8.5 15.5a5 5 0 0 1 0-7"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></Icon>;
        const Tv = (props) => <Icon {...props}><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></Icon>;
        const Trophy = (props) => <Icon {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
        const Globe = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></Icon>;
        const Youtube = (props) => <Icon {...props}><path d="M2.5 7.1c.1-1.3 1.2-2.3 2.5-2.4C8.2 4.5 12 4.5 12 4.5s3.8 0 7 .2c1.3.1 2.4 1.1 2.5 2.4-3.2.2-7 .2-7 .2s-3.8 0-7-.2c-1.3-.1-2.4-1.1-2.5-2.4-.2-1.6-.2-4.9-.2-4.9s0-3.3.2-4.9z"/><path d="M10 12.5l5-3-5-3v6z"/></Icon>;
        const AlertCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
        const ExternalLink = (props) => <Icon {...props}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;

        const playTuningSound = (audioCtx) => {
            try {
                const bufferSize = audioCtx.sampleRate * 1.2; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = 'bandpass';
                bandpass.frequency.setValueAtTime(400, audioCtx.currentTime);
                bandpass.frequency.exponentialRampToValueAtTime(3000, audioCtx.currentTime + 1.2);
                bandpass.Q.value = 5;
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.1); 
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + 1.0);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
                noise.connect(bandpass).connect(gainNode).connect(audioCtx.destination);
                noise.start();
            } catch (e) {
                console.warn("No se pudo reproducir el sonido de sintonización", e);
            }
        };

        const MatchCard = ({ match }) => (
            <div className="bg-white/10 backdrop-blur-2xl border border-white/10 rounded-[24px] p-5 flex flex-col gap-4 shrink-0 shadow-lg relative overflow-hidden mb-3">
                {match.status === 'in' && <div className="absolute top-0 left-0 w-1.5 h-full bg-red-500 animate-pulse"></div>}
                
                <div className="flex justify-between items-center border-b border-white/10 pb-3">
                    <p className="text-[11px] text-white/70 font-semibold uppercase tracking-wider truncate flex items-center gap-1">
                        {match.league || 'Mundial FIFA'}
                    </p>
                    <p className="text-[11px] text-white/40 font-medium">
                        {new Date(match.date).toLocaleDateString('es-VE', { timeZone: 'America/Caracas', day: '2-digit', month: '2-digit' })} - {new Date(match.date).toLocaleTimeString('es-VE', { timeZone: 'America/Caracas', hour: '2-digit', minute: '2-digit', hour12: true })}
                    </p>
                </div>
                
                <div className="flex justify-between items-center">
                    <div className="flex flex-col items-center w-[35%] text-center gap-2">
                        <img src={match.home.logo} alt={match.home.name} className="w-12 h-12 object-contain drop-shadow-md" onError={(e) => {e.target.src = 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png'}} />
                        <span className="text-[11px] font-semibold text-white/90 leading-tight line-clamp-2">{match.home.name}</span>
                    </div>
                    
                    <div className="flex flex-col items-center justify-center w-[30%] text-center">
                        {match.status === 'pre' ? (
                            <span className="text-[13px] font-bold text-white/50 bg-white/5 px-3 py-1.5 rounded-full">VS</span>
                        ) : (
                            <div className="flex flex-col items-center">
                                <div className="flex items-center gap-2">
                                    <span className="text-3xl font-bold text-white tracking-tighter">{match.home.score}</span>
                                    <span className="text-lg font-bold text-white/30">-</span>
                                    <span className="text-3xl font-bold text-white tracking-tighter">{match.away.score}</span>
                                </div>
                                <span className={`text-[10px] font-bold px-2.5 py-1 rounded-full mt-2 ${match.status === 'in' ? 'bg-red-500/20 text-red-400 border border-red-500/30' : 'bg-white/10 text-white/50'}`}>
                                    {match.detail}
                                </span>
                            </div>
                        )}
                    </div>

                    <div className="flex flex-col items-center w-[35%] text-center gap-2">
                        <img src={match.away.logo} alt={match.away.name} className="w-12 h-12 object-contain drop-shadow-md" onError={(e) => {e.target.src = 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png'}} />
                        <span className="text-[11px] font-semibold text-white/90 leading-tight line-clamp-2">{match.away.name}</span>
                    </div>
                </div>
                
                <div className="mt-1 pt-3 border-t border-white/10 flex justify-center items-center">
                    <p className="text-[10px] text-white/50 font-medium flex items-center gap-1.5">
                        <Tv size={12} className="text-white/40" />
                        Transmite: <span className="text-white/90 font-bold">Televen / DSports</span>
                    </p>
                </div>
            </div>
        );

        const App = () => {
          const [isPlaying, setIsPlaying] = useState(false);
          const [isTuning, setIsTuning] = useState(false);
          const [volume, setVolume] = useState(0.8);
          const [isMuted, setIsMuted] = useState(false);
          const [status, setStatus] = useState('Radio Apagada');
          const [viewMode, setViewMode] = useState('radio'); 
          
          const [songInfo, setSongInfo] = useState({ title: 'Programación en vivo', artist: 'La voz que te acompaña' });
          const [beatScale, setBeatScale] = useState(1); 
          const lastRawTitle = useRef(""); 

          // ESTADOS PARA DEPORTES
          const [sportsTab, setSportsTab] = useState('matches'); // 'matches', 'groups', 'bracket'
          const [matches, setMatches] = useState([]);
          const [standings, setStandings] = useState([]);
          const [bracket, setBracket] = useState([]);
          const [loadingSports, setLoadingSports] = useState(false);
          
          const [tvError, setTvError] = useState(false);

          const audioRef = useRef(null);
          const tvVideoRef = useRef(null); 
          const canvasRef = useRef(null); 
          const audioCtxRef = useRef(null);
          const analyserRef = useRef(null);
          const sourceRef = useRef(null);
          const dataArrayRef = useRef(null);
          const animationRef = useRef(null);
          const tuningTimeoutRef = useRef(null);

          const streamUrl = "https://stream.zeno.fm/2dcuqasrykauv";
          const zenoMetadataUrl = "https://api.zeno.fm/mounts/metadata/subscribe/2dcuqasrykauv";
          const tvLiveUrl = "https://www.youtube.com/@MucutuyVe/streams"; 
          const venevisionUrl = "https://venevision-blocked-cdn.encoders.immergo.tv/3/streamPlaylist.m3u8";
          
          const logoUrl = "https://lh3.googleusercontent.com/d/1XErHY3TjOCTLtAZQJAL1gSNGZtP7QcMA";

          useEffect(() => {
            if (!window.Hls) {
              const script = document.createElement('script');
              script.src = 'https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.8/hls.min.js';
              script.async = true;
              document.body.appendChild(script);
            }
          }, []);

          // Reproductor TV
          useEffect(() => {
            if (viewMode === 'tv' && tvVideoRef.current) {
              setTvError(false);
              const video = tvVideoRef.current;
              let hls;

              const initPlayer = () => {
                if (window.Hls && window.Hls.isSupported()) {
                  hls = new window.Hls();
                  hls.loadSource(venevisionUrl);
                  hls.attachMedia(video);
                  hls.on(window.Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                      setTvError(true);
                      hls.destroy();
                    }
                  });
                  hls.on(window.Hls.Events.MANIFEST_PARSED, function () {
                    video.play().catch(e => console.log("Autoplay prevent: ", e));
                  });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                  video.src = venevisionUrl;
                  video.onerror = () => setTvError(true);
                  video.addEventListener('loadedmetadata', function () {
                    video.play().catch(e => console.log("Autoplay prevent: ", e));
                  });
                }
              };

              if (window.Hls) {
                initPlayer();
              } else {
                setTimeout(initPlayer, 500);
              }

              return () => {
                if (hls) hls.destroy();
              };
            }
          }, [viewMode]);

          // ================== FETCH DEPORTES (MUNDIAL FIFA 2026) ==================
          useEffect(() => {
            let liveInterval;

            const fetchLiveMatches = async (showLoading = false) => {
                if (showLoading) setLoadingSports(true);
                try {
                    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard`);
                    const data = await res.json();
                    let allMatches = [];
                    if(data.events && data.events.length > 0) {
                        const leagueName = data.leagues[0].name;
                        data.events.forEach(ev => {
                            const comp = ev.competitions[0];
                            const homeTeam = comp.competitors.find(c => c.homeAway === 'home');
                            const awayTeam = comp.competitors.find(c => c.homeAway === 'away');
                            allMatches.push({
                                id: ev.id,
                                league: leagueName,
                                home: {
                                    name: homeTeam.team.shortDisplayName || homeTeam.team.name,
                                    score: homeTeam.score,
                                    logo: homeTeam.team.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png'
                                },
                                away: {
                                    name: awayTeam.team.shortDisplayName || awayTeam.team.name,
                                    score: awayTeam.score,
                                    logo: awayTeam.team.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png'
                                },
                                status: ev.status.type.state, 
                                detail: ev.status.type.shortDetail, 
                                date: ev.date
                            });
                        });
                    }
                    allMatches.sort((a, b) => {
                        const order = { 'in': 1, 'pre': 2, 'post': 3 };
                        if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
                        return new Date(a.date) - new Date(b.date);
                    });
                    setMatches(allMatches);
                } catch(e) {}
                if (showLoading) setLoadingSports(false);
            };

            const fetchStandings = async () => {
                try {
                    const res = await fetch(`https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings`);
                    const data = await res.json();
                    if (data && data.children) {
                        const groups = data.children.map(group => {
                            return {
                                name: group.name,
                                teams: group.standings?.entries?.map(entry => {
                                    const stats = entry.stats;
                                    const getStat = (abbrev) => stats.find(s => s.abbreviation === abbrev)?.value || 0;
                                    return {
                                        name: entry.team.shortDisplayName || entry.team.name,
                                        logo: entry.team.logos?.[0]?.href || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png',
                                        pts: getStat('P'), gp: getStat('GP'), w: getStat('W'), d: getStat('D'), l: getStat('L')
                                    };
                                }) || []
                            };
                        });
                        setStandings(groups);
                    }
                } catch(e) {}
            };

            const fetchBracket = async () => {
                try {
                    // Consultar eventos filtrados para el rango de fechas de eliminatorias
                    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260628-20260719&limit=100`);
                    const data = await res.json();
                    const phaseOrder = ['Final', 'Tercer Lugar', 'Semifinales', 'Cuartos de Final', 'Octavos de Final', '16avos de Final', 'Fase Final'];
                    const grouped = {};

                    if(data.events) {
                        data.events.forEach(ev => {
                            const comp = ev.competitions[0];
                            let phase = "Fase Final";
                            
                            // Determinar fase basado en las notas del evento de ESPN
                            if (comp.notes && comp.notes.length > 0) {
                                const hl = comp.notes[0].headline.toLowerCase();
                                if (hl.includes('32')) phase = '16avos de Final';
                                else if (hl.includes('16')) phase = 'Octavos de Final';
                                else if (hl.includes('quarter') || hl.includes('cuarto')) phase = 'Cuartos de Final';
                                else if (hl.includes('semi')) phase = 'Semifinales';
                                else if (hl.includes('3rd') || hl.includes('tercer')) phase = 'Tercer Lugar';
                                else if (hl.includes('final')) phase = 'Final';
                            }
                            
                            const homeTeam = comp.competitors.find(c => c.homeAway === 'home');
                            const awayTeam = comp.competitors.find(c => c.homeAway === 'away');
                            
                            const matchData = {
                                id: ev.id,
                                league: data.leagues[0].name,
                                home: {
                                    name: homeTeam?.team?.shortDisplayName || homeTeam?.team?.name || 'Por Definir',
                                    score: homeTeam?.score || '0',
                                    logo: homeTeam?.team?.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png'
                                },
                                away: {
                                    name: awayTeam?.team?.shortDisplayName || awayTeam?.team?.name || 'Por Definir',
                                    score: awayTeam?.score || '0',
                                    logo: awayTeam?.team?.logo || 'https://a.espncdn.com/i/teamlogos/soccer/500/default-team-logo-500.png'
                                },
                                status: ev.status.type.state,
                                detail: ev.status.type.shortDetail,
                                date: ev.date
                            };
                            
                            if (!grouped[phase]) grouped[phase] = [];
                            grouped[phase].push(matchData);
                        });
                    }
                    
                    const sortedGrouped = [];
                    phaseOrder.forEach(p => {
                        if(grouped[p] && grouped[p].length > 0) {
                            grouped[p].sort((a,b) => new Date(a.date) - new Date(b.date));
                            sortedGrouped.push({ phase: p, matches: grouped[p] });
                        }
                    });
                    setBracket(sortedGrouped);
                } catch(e) {}
            };

            // Iniciar ciclo de recarga silenciosa cada 30 segundos si la vista de deportes está activa
            if (viewMode === 'sports') {
                if (matches.length === 0) fetchLiveMatches(true);
                else fetchLiveMatches(false); // Refresco silencioso
                
                if (standings.length === 0) fetchStandings();
                if (bracket.length === 0) fetchBracket();

                liveInterval = setInterval(() => {
                    fetchLiveMatches(false); 
                }, 30000); 
            }

            return () => {
                if(liveInterval) clearInterval(liveInterval);
            };
          }, [viewMode]);

          // ================== METADATOS MUSICALES ==================
          useEffect(() => {
            if (audioRef.current) {
              audioRef.current.volume = volume;
            }

            const eventSource = new EventSource(zenoMetadataUrl);
            eventSource.onmessage = async (event) => {
              try {
                if (!event.data || typeof event.data !== 'string' || event.data.trim().startsWith('<')) return;

                const data = JSON.parse(event.data);
                
                if (data && typeof data.streamTitle !== 'undefined') {
                  const streamTitle = data.streamTitle;
                  
                  if (streamTitle === lastRawTitle.current) return;
                  lastRawTitle.current = streamTitle;

                  if (!streamTitle || streamTitle.trim() === '') {
                     setSongInfo({ title: 'Programación en vivo', artist: 'La voz que te acompaña' });
                     return;
                  }

                  let title = 'Programación en vivo';
                  let artist = 'PREGÓN 95.7';
                  
                  const parts = streamTitle.split(' - ');
                  if (parts.length > 1) {
                    artist = parts[0].trim();
                    title = parts.slice(1).join(' - ').trim();
                  } else {
                    title = streamTitle;
                  }
                  
                  const isGeneric = title.toLowerCase().includes('pregon') || 
                                    title.toLowerCase().includes('pregón') ||
                                    artist.toLowerCase().includes('pregon') ||
                                    artist.toLowerCase().includes('pregón') ||
                                    title.toLowerCase().includes('programación') ||
                                    title.toLowerCase().includes('publicidad') ||
                                    title.toLowerCase().includes('locucion') ||
                                    title.toLowerCase().includes('cuña') ||
                                    artist.toLowerCase().includes('en vivo');

                  if (isGeneric) {
                    setSongInfo({ title: 'Programación en vivo', artist: 'La voz que te acompaña' });
                  } else {
                    setSongInfo({ title, artist });
                  }
                }
              } catch (err) {}
            };

            return () => {
              eventSource.close();
            };
          }, []);

          // ================== CANVAS: ONDAS ANIMADAS ==================
          useEffect(() => {
            if (isPlaying) return; 
            
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let idleAnim;
            
            const drawIdle = () => {
                idleAnim = requestAnimationFrame(drawIdle);
                
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                const width = rect.width;
                const height = rect.height;

                ctx.clearRect(0, 0, width, height);
                
                const time = Date.now() / 1000;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.beginPath();
                ctx.moveTo(0, height);
                for (let x = 0; x < width; x++) {
                    const y = height - 30 + Math.sin(x * 0.01 + time) * 15;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fill();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let x = 0; x < width; x++) {
                    const y = height - 30 + Math.sin(x * 0.01 + time) * 15;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            };
            
            drawIdle();
            return () => cancelAnimationFrame(idleAnim);
          }, [isPlaying]);

          // Visualizador Activo
          const updateVisualizer = useCallback(() => {
            if (!analyserRef.current) return;
            animationRef.current = requestAnimationFrame(updateVisualizer);
            
            const analyser = analyserRef.current;
            if (!dataArrayRef.current) return;

            analyser.getByteFrequencyData(dataArrayRef.current);
            
            let bassSum = 0;
            for (let i = 0; i < 5; i++) {
              bassSum += dataArrayRef.current[i] || 0;
            }
            const bassAvg = bassSum / 5;
            const normalizedBass = Math.pow(bassAvg / 255, 1.5);
            setBeatScale(1 + normalizedBass * 0.1); 

            if (canvasRef.current) {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const bufferLength = analyser.frequencyBinCount;
                
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                const width = rect.width;
                const height = rect.height;

                ctx.clearRect(0, 0, width, height);
                const sliceWidth = width / bufferLength;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; 
                ctx.beginPath();
                ctx.moveTo(0, height);
                
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArrayRef.current[i] / 255.0;
                    const y = height - (v * v * height * 0.8) - 10; 
                    
                    ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; 
                ctx.lineWidth = 2;
                ctx.stroke();
            }

          }, []);

          const setupAudioContext = () => {
            try {
                if (!audioCtxRef.current) {
                  const AudioContext = window.AudioContext || window.webkitAudioContext;
                  audioCtxRef.current = new AudioContext();
                  analyserRef.current = audioCtxRef.current.createAnalyser();
                  analyserRef.current.fftSize = 256; 
                  analyserRef.current.smoothingTimeConstant = 0.85; 

                  sourceRef.current = audioCtxRef.current.createMediaElementSource(audioRef.current);
                  sourceRef.current.connect(analyserRef.current);
                  analyserRef.current.connect(audioCtxRef.current.destination);
                  dataArrayRef.current = new Uint8Array(analyserRef.current.frequencyBinCount);
                }
                if (audioCtxRef.current.state === 'suspended') {
                  audioCtxRef.current.resume();
                }
            } catch (error) {
                console.warn("Visualizador de audio restringido por CORS/Seguridad:", error);
            }
          };

          const handlePlayToggle = async () => {
            if (isPlaying) {
              audioRef.current.pause();
              setIsPlaying(false);
              setStatus('Radio en pausa');
              if (animationRef.current) cancelAnimationFrame(animationRef.current);
              if (tuningTimeoutRef.current) clearTimeout(tuningTimeoutRef.current);
              setIsTuning(false);
              setBeatScale(1);
            } else {
              setStatus('Sintonizando...');
              setIsTuning(true);
              
              try {
                  if (!audioCtxRef.current) {
                     const AudioContext = window.AudioContext || window.webkitAudioContext;
                     audioCtxRef.current = new AudioContext();
                  }
                  if (audioCtxRef.current.state === 'suspended') {
                     await audioCtxRef.current.resume();
                  }
                  playTuningSound(audioCtxRef.current);
              } catch(e) {
                  console.warn("Contexto de audio no disponible para sonido de sintonización", e);
              }

              tuningTimeoutRef.current = setTimeout(() => {
                  setIsTuning(false);
                  audioRef.current.load();
                  setupAudioContext(); // Inicia visualizador seguro
                  
                  audioRef.current.play()
                      .then(() => {
                        setIsPlaying(true);
                        setStatus('Al Aire');
                        updateVisualizer();
                      })
                      .catch((err) => {
                        console.error("Error al reproducir audio:", err);
                        setStatus('Error de Señal');
                        setIsPlaying(false);
                      });
              }, 1200);
            }
          };

          const handleVolumeChange = (e) => {
            const val = parseFloat(e.target.value);
            setVolume(val);
            if (audioRef.current) audioRef.current.volume = val;
            if (val > 0 && isMuted) {
              setIsMuted(false);
              if (audioRef.current) audioRef.current.muted = false;
            }
          };

          const toggleMute = () => {
            const newMutedState = !isMuted;
            setIsMuted(newMutedState);
            if (audioRef.current) audioRef.current.muted = newMutedState;
          };

          const handleViewModeChange = (mode) => {
            setViewMode(mode);
            if (mode === 'tv' && isPlaying && audioRef.current) {
               audioRef.current.pause();
               setIsPlaying(false);
               setStatus('Radio en pausa');
               setIsTuning(false);
               setBeatScale(1);
            }
          };

          return (
            <div className="flex flex-col h-[100dvh] w-full font-sans selection:bg-red-500/30" style={{ backgroundColor: '#09090b' }}>
              
              {/* === FONDO DINÁMICO === */}
              <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden flex flex-col justify-end bg-zinc-950">
                  <div 
                    className="absolute top-[-20%] left-[-20%] w-[80%] h-[80%] rounded-full mix-blend-screen transition-all duration-[2000ms] ease-in-out"
                    style={{ 
                        backgroundColor: isPlaying && !isTuning ? '#dc2626' : '#27272a',
                        filter: 'blur(160px)',
                        transform: `scale(${isPlaying && !isTuning ? 1 + (beatScale - 1) * 1.5 : 1})`,
                        opacity: isPlaying && !isTuning ? Math.min(0.6, 0.3 + (beatScale - 1) * 1.2) : 0.2
                    }}
                  ></div>
                  <div 
                    className="absolute bottom-[-10%] right-[-20%] w-[70%] h-[70%] rounded-full mix-blend-screen transition-all duration-[2000ms] ease-in-out"
                    style={{ 
                        backgroundColor: isPlaying && !isTuning ? '#16a34a' : '#18181b',
                        filter: 'blur(160px)',
                        transform: `scale(${isPlaying && !isTuning ? 1 + (beatScale - 1) * 1.8 : 1})`,
                        opacity: isPlaying && !isTuning ? Math.min(0.5, 0.2 + (beatScale - 1) * 1.2) : 0.15
                    }}
                  ></div>
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-[60px]"></div>

                  {/* Canvas de Ondas Absolutamente Visible */}
                  <canvas 
                    ref={canvasRef} 
                    className="absolute bottom-[60px] left-0 w-full h-[40%] opacity-100 z-0 pointer-events-none"
                  ></canvas>
              </div>

              {/* === ÁREA PRINCIPAL === */}
              <main className="flex-1 relative z-10 w-full max-w-md mx-auto flex flex-col pt-safe overflow-hidden">
                  
                  {/* === ENCABEZADO MINIMALISTA iOS === */}
                  <header className="flex justify-between items-center py-6 px-6 shrink-0 z-20">
                      <div className="flex items-center gap-3">
                          <div className="w-10 h-10 rounded-[12px] overflow-hidden bg-white shadow-sm shrink-0 flex items-center justify-center p-1">
                              <img src={logoUrl} alt="Logo" className="w-full h-full object-contain" onError={(e) => { e.target.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2NjYyIvPjx0ZXh0IHg9IjUwIiB5PSI1MCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGFsaWdubWVudC1iYXNlbGluZT0ibWlkZGxlIiBmaWxsPSIjMzMzIj5Mb2dvPC90ZXh0Pjwvc3ZnPg=='}} />
                          </div>
                          <div className="flex flex-col">
                              <h1 className="text-xl font-bold tracking-tight text-white/90 leading-tight">
                                  PREGÓN <span className="text-red-500">95.7</span>
                              </h1>
                              <div className="flex items-center gap-1.5 mt-0.5">
                                  {isPlaying && !isTuning ? (
                                      <span className="relative flex h-1.5 w-1.5">
                                          <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                          <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span>
                                      </span>
                                  ) : (
                                      <span className="h-1.5 w-1.5 rounded-full bg-white/30"></span>
                                  )}
                                  <span className="text-[11px] font-medium tracking-wide text-white/60">
                                      {status}
                                  </span>
                              </div>
                          </div>
                      </div>
                  </header>

                  {/* === CONTENEDOR DE VISTAS (SCROLL SEGURO) === */}
                  <div className="flex-1 w-full relative">
                      
                      {/* --- VISTA REPRODUCTOR RADIO --- */}
                      <div className={`absolute inset-0 w-full h-full overflow-y-auto custom-scrollbar px-6 pb-6 transition-opacity duration-300 flex flex-col items-center justify-between ${viewMode === 'radio' ? 'opacity-100 z-10' : 'opacity-0 pointer-events-none z-0'}`}>
                          
                          <audio ref={audioRef} src={streamUrl} crossOrigin="anonymous" preload="none" />

                          {/* Carátula Cuadrada Central iOS */}
                          <div className="w-full mt-2 shrink-0 flex justify-center">
                              <div 
                                className="relative w-full aspect-square max-w-[320px] rounded-[32px] shadow-[0_20px_40px_rgba(0,0,0,0.5)] overflow-hidden bg-zinc-900 border border-white/5"
                                style={{ 
                                    transform: `scale(${isPlaying && !isTuning ? beatScale : 1})`, 
                                    transition: isPlaying && !isTuning ? 'transform 0.05s ease-out' : 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)' 
                                }}
                              >
                                <img 
                                    src="https://images.unsplash.com/photo-1590602847861-f357a9332bbc?auto=format&fit=crop&w=800&q=80" 
                                    alt="Estudio" 
                                    className={`absolute inset-0 w-full h-full object-cover transition-all duration-[1500ms] ${isPlaying && !isTuning ? 'scale-100 opacity-90' : 'scale-110 opacity-30 grayscale-[50%]'}`} 
                                />
                                <div className="absolute inset-0 bg-black/40"></div>
                                <div className="absolute inset-0 flex items-center justify-center p-8">
                                    <img src={logoUrl} alt="Logo Central" className={`w-full h-full object-contain drop-shadow-2xl transition-all duration-700 ${isPlaying && !isTuning ? 'opacity-100 scale-100' : 'opacity-60 scale-95'}`} onError={(e) => { e.target.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2NjYyIvPjx0ZXh0IHg9IjUwIiB5PSI1MCIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGFsaWdubWVudC1iYXNlbGluZT0ibWlkZGxlIiBmaWxsPSIjMzMzIj5Mb2dvPC90ZXh0Pjwvc3ZnPg=='}} />
                                </div>
                              </div>
                          </div>

                          {/* Título y Artista */}
                          <div className="flex flex-col items-start w-full mt-8 mb-auto shrink-0">
                            <h2 className={`text-[26px] font-bold tracking-tight text-white w-full truncate ${isTuning ? 'opacity-50' : 'opacity-100'} transition-opacity duration-300`}>
                              {isTuning ? 'Buscando señal...' : songInfo.title}
                            </h2>
                            <p className="text-[17px] text-white/60 font-medium tracking-tight truncate w-full mt-0.5">
                              {isTuning ? 'Sintonizando FM' : songInfo.artist}
                            </p>
                          </div>

                          {/* Controles de Reproducción y Volumen */}
                          <div className="w-full flex flex-col gap-8 shrink-0 mt-4">
                              
                              {/* Deslizador de Volumen iOS Style */}
                              <div className="flex items-center gap-3 w-full">
                                  <button onClick={toggleMute} className="text-white/50 hover:text-white transition-colors active:scale-90">
                                      {isMuted || volume === 0 ? <VolumeX size={16} /> : <Volume2 size={16} />}
                                  </button>
                                  <div className="relative w-full h-1.5 flex items-center bg-white/20 rounded-full group cursor-pointer">
                                      <div className="absolute left-0 h-full bg-white/90 rounded-full" style={{ width: `${(isMuted ? 0 : volume) * 100}%` }}></div>
                                      <input 
                                          type="range" min="0" max="1" step="0.01" 
                                          value={isMuted ? 0 : volume} onChange={handleVolumeChange} 
                                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                                      />
                                  </div>
                                  <Volume2 size={20} className="text-white/50" />
                              </div>

                              {/* BOTÓN PLAY GIGANTE CENTRAL */}
                              <div className="flex items-center justify-center w-full pb-4">
                                  <button 
                                      onClick={handlePlayToggle} 
                                      disabled={isTuning}
                                      className={`relative flex items-center justify-center rounded-full transition-all duration-[400ms] ${isPlaying || isTuning ? 'w-[80px] h-[80px] bg-red-500/20 text-red-500 hover:bg-red-500/30' : 'w-[90px] h-[90px] bg-white text-black shadow-xl'} ${isTuning ? 'opacity-50 cursor-wait scale-90' : 'active:scale-90'}`}
                                  >
                                      {isPlaying || isTuning ? <Pause size={36} /> : <Play size={40} className="ml-1.5" />}
                                  </button>
                              </div>
                          </div>
                      </div>

                      {/* --- VISTA TV --- */}
                      <div className={`absolute inset-0 w-full h-full overflow-y-auto custom-scrollbar px-6 pb-6 transition-opacity duration-300 flex flex-col gap-4 ${viewMode === 'tv' ? 'opacity-100 z-10' : 'opacity-0 pointer-events-none z-0'}`}>
                          <div className="w-full bg-white/10 backdrop-blur-2xl rounded-[28px] overflow-hidden shadow-2xl relative border border-white/10 shrink-0">
                              <div className="absolute top-4 left-4 bg-red-500 text-white text-[10px] font-bold px-2.5 py-1 rounded-full z-10 flex items-center gap-1.5 shadow-md backdrop-blur-md bg-opacity-80">
                                  <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                                  EN VIVO
                              </div>
                              
                              {tvError && (
                                <div className="absolute inset-0 bg-black/80 z-20 flex flex-col items-center justify-center p-6 text-center backdrop-blur-md">
                                   <AlertCircle size={40} className="text-white/40 mb-3" />
                                   <h3 className="text-base font-semibold text-white mb-1">Señal Expirada</h3>
                                   <p className="text-xs text-white/50">El servidor cerró la conexión.</p>
                                </div>
                              )}

                              <video ref={tvVideoRef} className={`w-full aspect-video object-cover bg-black ${tvError ? 'hidden' : 'block'}`} controls playsInline></video>
                              <div className="p-5 flex flex-col gap-1">
                                  <h3 className="text-lg font-bold text-white tracking-tight">Venevisión</h3>
                                  <p className="text-[13px] text-white/60">Señal Nacional Continua</p>
                              </div>
                          </div>

                          <a href={tvLiveUrl} target="_blank" rel="noopener noreferrer" className="w-full bg-white/5 backdrop-blur-xl rounded-[24px] border border-white/10 relative shadow-lg flex items-center p-4 active:scale-95 transition-all cursor-pointer shrink-0 mt-2">
                              <div className="w-12 h-12 rounded-full bg-red-500/20 text-red-500 flex items-center justify-center shrink-0">
                                  <Youtube size={26} />
                              </div>
                              <div className="ml-4 flex-1">
                                  <h3 className="text-[15px] font-semibold text-white tracking-tight">Canal YouTube</h3>
                                  <p className="text-white/50 text-[13px] mt-0.5">@MucutuyVe</p>
                              </div>
                              <ExternalLink size={20} className="text-white/30" />
                          </a>
                      </div>

                      {/* --- VISTA DEPORTES ACTUALIZADA (Grupos + Llaves) --- */}
                      <div className={`absolute inset-0 w-full h-full overflow-y-auto custom-scrollbar px-6 pb-6 transition-opacity duration-300 flex flex-col gap-3 ${viewMode === 'sports' ? 'opacity-100 z-10' : 'opacity-0 pointer-events-none z-0'}`}>
                          
                          <h3 className="text-[13px] font-semibold tracking-wide text-white/50 uppercase px-2 mb-1 shrink-0 flex items-center gap-2 mt-2">
                              <Globe size={16} className="text-blue-500" /> Mundial FIFA 2026
                          </h3>

                          {/* Control Segmentado iOS Style */}
                          <div className="flex bg-[#1c1c1e] p-1 rounded-[14px] border border-white/5 w-full shrink-0 mb-3 z-10 shadow-inner">
                              <button 
                                onClick={() => setSportsTab('matches')} 
                                className={`flex-1 py-1.5 text-[12px] font-semibold rounded-[10px] transition-all duration-300 ${sportsTab === 'matches' ? 'bg-[#3a3a3c] text-white shadow-md' : 'text-white/40'}`}
                              >
                                En Vivo / Hoy
                              </button>
                              <button 
                                onClick={() => setSportsTab('groups')} 
                                className={`flex-1 py-1.5 text-[12px] font-semibold rounded-[10px] transition-all duration-300 ${sportsTab === 'groups' ? 'bg-[#3a3a3c] text-white shadow-md' : 'text-white/40'}`}
                              >
                                Grupos
                              </button>
                              <button 
                                onClick={() => setSportsTab('bracket')} 
                                className={`flex-1 py-1.5 text-[12px] font-semibold rounded-[10px] transition-all duration-300 ${sportsTab === 'bracket' ? 'bg-[#3a3a3c] text-white shadow-md' : 'text-white/40'}`}
                              >
                                Llaves
                              </button>
                          </div>
                          
                          {loadingSports ? (
                              <div className="flex flex-col items-center justify-center py-12 shrink-0">
                                  <div className="animate-spin rounded-full h-8 w-8 border-2 border-transparent border-t-white mb-4"></div>
                                  <p className="text-[13px] text-white/50">Cargando resultados globales...</p>
                              </div>
                          ) : sportsTab === 'matches' ? (
                              // TABLA 1: EN VIVO Y HOY
                              matches.length > 0 ? (
                                  matches.map((match, i) => <MatchCard key={i} match={match} />)
                              ) : (
                                  <div className="text-center py-12 flex flex-col items-center shrink-0">
                                      <Trophy size={48} className="text-white/20 mb-4" />
                                      <p className="text-[13px] text-white/50">No hay partidos destacados hoy.</p>
                                  </div>
                              )
                          ) : sportsTab === 'groups' ? (
                              // TABLA 2: GRUPOS MUNDIAL
                              standings.length > 0 ? (
                                  standings.map((group, idx) => (
                                      <div key={idx} className="bg-white/10 backdrop-blur-2xl border border-white/10 rounded-[24px] p-4 flex flex-col gap-2 shrink-0 shadow-lg mb-2">
                                          <h4 className="text-white font-bold text-[15px] tracking-tight ml-2 mt-1">{group.name}</h4>
                                          <div className="flex text-[10px] text-white/50 border-b border-white/10 pb-2 uppercase font-bold tracking-wider mt-2">
                                              <div className="flex-1 ml-2">Selección</div>
                                              <div className="w-6 text-center" title="Partidos Jugados">PJ</div>
                                              <div className="w-6 text-center" title="Victorias">G</div>
                                              <div className="w-6 text-center" title="Empates">E</div>
                                              <div className="w-6 text-center" title="Derrotas">P</div>
                                              <div className="w-8 text-center text-white/80">Pts</div>
                                          </div>
                                          {group.teams.map((team, tIdx) => (
                                              <div key={tIdx} className="flex items-center text-[11px] text-white py-2.5 border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors rounded-lg px-2 -mx-2">
                                                  <div className="flex-1 flex items-center gap-2">
                                                      <span className="text-white/30 font-bold w-3 text-right">{tIdx + 1}</span>
                                                      <img src={team.logo} alt={team.name} className="w-5 h-5 object-contain" />
                                                      <span className="font-semibold truncate">{team.name}</span>
                                                  </div>
                                                  <div className="w-6 text-center text-white/60">{team.gp}</div>
                                                  <div className="w-6 text-center text-white/60">{team.w}</div>
                                                  <div className="w-6 text-center text-white/60">{team.d}</div>
                                                  <div className="w-6 text-center text-white/60">{team.l}</div>
                                                  <div className="w-8 text-center font-bold text-red-400 text-xs">{team.pts}</div>
                                              </div>
                                          ))}
                                      </div>
                                  ))
                              ) : (
                                  <div className="text-center py-12 flex flex-col items-center shrink-0">
                                      <Globe size={48} className="text-white/20 mb-4" />
                                      <p className="text-[13px] text-white/50">Los grupos aún no están disponibles.</p>
                                  </div>
                              )
                          ) : (
                              // TABLA 3: LLAVES / ELIMINATORIAS
                              bracket.length > 0 ? (
                                  bracket.map((phaseGroup, idx) => (
                                      <div key={idx} className="mb-2 shrink-0">
                                          <div className="flex items-center gap-3 mb-3 ml-2 mt-2">
                                              <div className="h-px bg-white/20 flex-1"></div>
                                              <h4 className="text-[11px] text-white/50 uppercase font-bold tracking-widest">{phaseGroup.phase}</h4>
                                              <div className="h-px bg-white/20 flex-1"></div>
                                          </div>
                                          {phaseGroup.matches.map((match, mIdx) => <MatchCard key={mIdx} match={match} />)}
                                      </div>
                                  ))
                              ) : (
                                  <div className="text-center py-12 flex flex-col items-center shrink-0">
                                      <Trophy size={48} className="text-white/20 mb-4" />
                                      <p className="text-[13px] text-white/50 text-center px-4">Aún no se han definido los equipos de la fase final.</p>
                                  </div>
                              )
                          )}
                      </div>

                      {/* --- VISTA SATÉLITE --- */}
                      <div className={`absolute inset-0 w-full h-full overflow-y-auto custom-scrollbar px-6 pb-6 transition-opacity duration-300 flex flex-col gap-4 ${viewMode === 'nasa' ? 'opacity-100 z-10' : 'opacity-0 pointer-events-none z-0'}`}>
                          <div className="bg-white/10 backdrop-blur-2xl border border-white/10 rounded-[24px] p-5 flex flex-col shrink-0">
                              <div className="flex items-center gap-2 mb-1">
                                  <Globe size={18} className="text-white/80"/>
                                  <span className="text-[13px] font-semibold text-white tracking-wide">Satélite Mucutuy</span>
                              </div>
                              <p className="text-[11px] text-white/50 mt-1">8.2456° N, -71.2864° W</p>
                          </div>
                          
                          <div className="flex-1 w-full bg-black rounded-[24px] border border-white/10 overflow-hidden relative min-h-[300px] shadow-2xl shrink-0">
                              <iframe 
                                  src="https://maps.google.com/maps?q=8.245647,-71.286413&t=k&z=15&ie=UTF8&iwloc=&output=embed" 
                                  className="w-full h-full border-0 opacity-90 transition-opacity duration-700"
                                  allowFullScreen="" loading="lazy" referrerPolicy="no-referrer-when-downgrade"
                              ></iframe>
                              
                              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
                                  <div className="w-2.5 h-2.5 bg-blue-500 rounded-full z-10 shadow-[0_0_15px_rgba(59,130,246,0.8)] border border-white/50"></div>
                                  <div className="absolute w-[40px] h-[40px] bg-blue-500/20 rounded-full animate-ping"></div>
                              </div>
                          </div>
                      </div>

                  </div>
              </main>

              {/* === BARRA DE NAVEGACIÓN INFERIOR (TAB BAR iOS 17) === */}
              <nav className="w-full bg-black/60 backdrop-blur-[40px] border-t border-white/10 pb-safe pt-2 px-4 shrink-0 relative z-30">
                  <div className="flex justify-around items-center max-w-md mx-auto h-[60px]">
                      <button onClick={() => handleViewModeChange('radio')} className={`flex flex-col items-center justify-center w-[72px] gap-1 transition-colors ${viewMode === 'radio' ? 'text-white' : 'text-white/40 hover:text-white/70'}`}>
                          <Radio size={26} />
                          <span className="text-[10px] font-medium tracking-wide">Radio</span>
                      </button>
                      <button onClick={() => handleViewModeChange('tv')} className={`flex flex-col items-center justify-center w-[72px] gap-1 transition-colors ${viewMode === 'tv' ? 'text-white' : 'text-white/40 hover:text-white/70'}`}>
                          <Tv size={26} />
                          <span className="text-[10px] font-medium tracking-wide">TV</span>
                      </button>
                      <button onClick={() => handleViewModeChange('sports')} className={`flex flex-col items-center justify-center w-[72px] gap-1 transition-colors ${viewMode === 'sports' ? 'text-white' : 'text-white/40 hover:text-white/70'}`}>
                          <Trophy size={26} />
                          <span className="text-[10px] font-medium tracking-wide">Deportes</span>
                      </button>
                      <button onClick={() => handleViewModeChange('nasa')} className={`flex flex-col items-center justify-center w-[72px] gap-1 transition-colors ${viewMode === 'nasa' ? 'text-white' : 'text-white/40 hover:text-white/70'}`}>
                          <MapPin size={26} />
                          <span className="text-[10px] font-medium tracking-wide">Ubicación</span>
                      </button>
                  </div>
              </nav>

              {/* ESTILOS CSS ADICIONALES */}
              <style dangerouslySetInnerHTML={{__html: `
                .pt-safe { padding-top: env(safe-area-inset-top, 1rem); }
                .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
                .custom-scrollbar::-webkit-scrollbar { width: 0px; background: transparent; }
                .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
              `}} />
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
